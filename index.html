<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>店舗連絡先QRメーカー</title>
    <!-- QRコード生成用の軽量ライブラリを読み込み -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f4f7f6;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #004494; }
        #qrcode-container {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #qrcode { margin-bottom: 10px; }
        .note {
            text-align: center;
            font-size: 0.85em;
            color: #d9534f;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>店舗連絡先QRメーカー</h2>
        
        <div class="form-group">
            <label for="storeName">店舗名（必須）</label>
            <input type="text" id="storeName" placeholder="例: モバイルショップ 〇〇店">
        </div>

        <div class="form-group">
            <label for="phoneNumber">電話番号（必須）</label>
            <input type="tel" id="phoneNumber" placeholder="例: 03-1234-5678">
        </div>

        <div class="form-group">
            <label for="address">住所</label>
            <input type="text" id="address" placeholder="例: 埼玉県〇〇市〇〇1-2-3">
        </div>

        <button onclick="generateQR()">QRコードを生成</button>

        <div id="qrcode-container">
            <div id="qrcode"></div>
            <p class="note" id="instruction" style="display:none;">
                ※生成されたQRコードを右クリック（スマホなら長押し）して<br>「画像として保存」し、POP素材としてご活用ください。
            </p>
        </div>
    </div>

    <script>
        function generateQR() {
            const name = document.getElementById('storeName').value.trim();
            const phone = document.getElementById('phoneNumber').value.trim();
            const address = document.getElementById('address').value.trim();

            if (!name || !phone) {
                alert("店舗名と電話番号は入力必須です。");
                return;
            }

            // iOS/Android共通で読み取れるvCard 3.0形式の文字列を構築
            // N: 名前, TEL: 電話番号, ADR: 住所
            const vcardData = 
`BEGIN:VCARD
VERSION:3.0
N:${name}
TEL;TYPE=WORK,VOICE:${phone}
ADR;TYPE=WORK:;;${address};;;;
END:VCARD`;

            // 既存のQRコードをクリア
            const qrElement = document.getElementById('qrcode');
            qrElement.innerHTML = "";

            // QRコードを生成（エラー訂正レベルMで少し複雑なデータにも対応）
            new QRCode(qrElement, {
                text: vcardData,
                width: 200,
                height: 200,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.M
            });

            // 保存案内のテキストを表示
            document.getElementById('instruction').style.display = "block";
        }
    </script>

</body>
</html>
